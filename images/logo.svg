<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Shield background -->
  <path d="M100 10 L175 40 L175 110 Q175 160 100 190 Q25 160 25 110 L25 40 Z"
        fill="#1a0a00" stroke="#e06500" stroke-width="4"/>
  <!-- Inner shield -->
  <path d="M100 22 L163 47 L163 110 Q163 152 100 178 Q37 152 37 110 L37 47 Z"
        fill="none" stroke="#e06500" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Jackhammer body -->
  <rect x="78" y="42" width="18" height="10" rx="3" fill="#e06500"/>
  <rect x="82" y="52" width="10" height="6" rx="1" fill="#e06500"/>
  <rect x="84" y="58" width="6" height="46" rx="3" fill="#e06500"/>
  <!-- Hammer tip -->
  <path d="M82 104 L87 114 L92 104 Z" fill="#e06500"/>

  <!-- Handle left -->
  <rect x="66" y="50" width="14" height="6" rx="3" fill="#e06500"/>
  <!-- Handle connector -->
  <rect x="78" y="44" width="6" height="4" rx="1" fill="#cc5500"/>

  <!-- Wrecking ball -->
  <circle cx="110" cy="108" r="14" fill="#e06500"/>
  <circle cx="110" cy="108" r="10" fill="#cc5500"/>
  <!-- Ball shine -->
  <circle cx="105" cy="103" r="3" fill="#ff8c00" opacity="0.6"/>
  <!-- Ball chain -->
  <line x1="110" y1="94" x2="118" y2="72" stroke="#e06500" stroke-width="3" stroke-linecap="round"/>

  <!-- Building fragments (rubble) -->
  <rect x="62" y="118" width="10" height="8" rx="1" fill="#4a6080" transform="rotate(-15 67 122)"/>
  <rect x="75" y="124" width="7" height="6" rx="1" fill="#3a5070" transform="rotate(8 78 127)"/>
  <rect x="56" y="126" width="6" height="5" rx="1" fill="#4a6080" transform="rotate(-25 59 128)"/>

  <!-- Lightning bolts -->
  <path d="M122 70 L130 58 L126 70 L134 62 L128 76 Z" fill="#e06500"/>
  <path d="M135 82 L143 72 L139 82 L147 76 L141 88 Z" fill="#e06500"/>

  <!-- Arrow right-up -->
  <path d="M144 95 L158 80 M158 80 L148 80 M158 80 L158 90" stroke="#e06500" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Crack lines from impact -->
  <path d="M95 112 L82 122 M95 112 L88 128 M95 112 L78 118" stroke="#e06500" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
</svg>
